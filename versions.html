<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宪法序言版本迭代 - 交互学习</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/versions.css">
</head>
<body>
    <div class="page-wrapper">
        <!-- 导航栏 -->
        <nav class="navbar" id="navbar">
            <div class="navbar-inner">
                <a href="index.html" class="navbar-brand">宪法序言·交互学习</a>
                <button class="navbar-toggle" aria-label="菜单" id="navToggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <ul class="navbar-nav" id="navLinks">
                    <li><a href="index.html" class="navbar-link">首页</a></li>
                    <li><a href="preamble.html" class="navbar-link">序言展示</a></li>
                    <li><a href="versions.html" class="navbar-link active">版本迭代</a></li>
                    <li><a href="quiz.html" class="navbar-link">知识闯关</a></li>
                    <li><a href="co-create.html" class="navbar-link">共创序言</a></li>
                </ul>
            </div>
        </nav>

        <!-- 主要内容 -->
        <main class="main-content versions-page">
            <!-- 标题区 -->
            <div class="versions-header">
                <div class="container">
                    <h1 class="versions-title">宪法序言版本迭代</h1>
                    <p class="versions-subtitle">见证国家法治建设的历史进程</p>
                </div>
            </div>

            <!-- 时间轴 -->
            <section class="timeline-section">
                <div class="container">
                    <h2 class="section-title">历史版本</h2>
                    <div class="timeline" id="timeline">
                    </div>
                </div>
            </section>

            <!-- 版本对比 -->
            <section class="compare-section">
                <div class="container">
                    <h2 class="section-title">版本对比</h2>
                    
                    <!-- 颜色图例 -->
                    <div class="diff-legend">
                        <div class="legend-item">
                            <span class="legend-color legend-old"></span>
                            <span class="legend-text">旧版本内容</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color legend-new"></span>
                            <span class="legend-text">新版本内容</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color legend-keyword"></span>
                            <span class="legend-text">核心关键词</span>
                        </div>
                    </div>
                    
                    <div class="compare-controls">
                        <div class="compare-select-group">
                            <label for="version1">旧版本</label>
                            <select id="version1" class="version-select">
                            </select>
                        </div>
                        <div class="compare-icon">→</div>
                        <div class="compare-select-group">
                            <label for="version2">新版本</label>
                            <select id="version2" class="version-select">
                            </select>
                        </div>
                        <button id="compareBtn" class="btn btn-primary">开始对比</button>
                    </div>
                    
                    <div class="compare-result" id="compareResult">
                    </div>
                </div>
            </section>
        </main>

        <!-- 页脚 -->
        <footer class="footer">
            <div class="footer-inner">
                <p class="footer-text">宪法序言交互学习系统</p>
                <div class="footer-links">
                    <a href="index.html" class="footer-link">返回首页</a>
                </div>
            </div>
        </footer>
    </div>

    <script src="js/main.js"></script>
    <script src="js/versions.js"></script>
</body>
</html>
